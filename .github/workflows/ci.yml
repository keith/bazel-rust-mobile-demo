name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-host:
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Build host binary
        run: bazelisk run //:normal_binary

  build-apple:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build iOS app
        run: bazelisk build //:ios_app
      - name: Build macOS app
        run: bazelisk run //:macos_app

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Android
        run: bazelisk build //:android_app
